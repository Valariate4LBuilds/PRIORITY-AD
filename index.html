<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Priority Auditor - To-Do List App</title><link rel="stylesheet" href="styles.css"></head><body><div class="container"><header><h1>📝 Priority Auditor</h1></header><div class="input-section"><input type="text" id="taskInput" placeholder="Add a new task..." autofocus><button id="addBtn" class="add-btn">Add Task</button></div><div class="filter-section"><button class="filter-btn active" data-filter="all">All</button><button class="filter-btn" data-filter="active">Active</button><button class="filter-btn" data-filter="completed">Completed</button></div><div class="stats"><span id="taskCount">0 tasks remaining</span><button id="clearBtn" class="clear-btn">Clear Completed</button></div><ul id="taskList" class="task-list"></ul><div class="empty-state" id="emptyState"><p>No tasks yet. Add one to get started! 🚀</p></div><div class="test-section"><button id="runTests" class="test-btn">🧪 Run Tests</button><button id="generateReport" class="report-btn">📊 Generate Report</button></div></div><script src="script.js"></script><script src="test.js"></script><script>document.getElementById('runTests').addEventListener('click', () => {const tester = new TodoAppTester();tester.runAllTests();});document.getElementById('generateReport').addEventListener('click', () => {const tester = new TodoAppTester();tester.runAllTests();const reportHtml = tester.generateHTMLReport();const blob = new Blob([reportHtml], { type: 'text/html' });const url = URL.createObjectURL(blob);const a = document.createElement('a');a.href = url;a.download = `Priority-Auditor-Report-${new Date().toISOString().split('T')[0]}.html`;a.click();URL.revokeObjectURL(url);alert('Report generated and downloaded!');});</script></body></html>
